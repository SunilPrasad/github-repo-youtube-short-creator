<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: linear-gradient(160deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
  }
  .orb-1 { width: 400px; height: 400px; background: #22d3ee; top: 300px; right: -100px; }
  .orb-2 { width: 350px; height: 350px; background: #667eea; bottom: 250px; left: -80px; }

  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 50px;
  }

  .header {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .tag {
    font-size: 28px;
    font-weight: 700;
    color: #22d3ee;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .title {
    font-size: 76px;
    font-weight: 900;
    line-height: 1.05;
    background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .divider {
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, #22d3ee, #667eea);
    border-radius: 2px;
    margin-top: 8px;
  }

  /* Faux terminal window */
  .terminal {
    background: #0d1117;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }

  .terminal-bar {
    background: #161b22;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
  }
  .dot-red    { background: #ff5f57; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green  { background: #28c840; }

  .terminal-title {
    margin-left: 12px;
    font-size: 26px;
    color: rgba(255,255,255,0.4);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }

  .terminal-body {
    padding: 36px 40px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 34px;
    line-height: 1.8;
    color: #e6edf3;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .prompt {
    color: #22d3ee;
    font-weight: 700;
  }

  .highlight-line {
    background: rgba(34, 211, 238, 0.08);
    border-left: 3px solid #22d3ee;
    margin: 0 -40px;
    padding: 6px 40px;
    display: block;
  }

  .description-text {
    font-size: 38px;
    color: rgba(255,255,255,0.7);
    line-height: 1.5;
    font-weight: 300;
  }

  .repo-label {
    text-align: center;
    font-size: 30px;
    color: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="content">
    <div class="header">
      <div class="tag">{{REPO_NAME}}</div>
      <div class="title">Get Started</div>
      <div class="divider"></div>
    </div>

    <div class="terminal">
      <div class="terminal-bar">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
        <div class="terminal-title">terminal</div>
      </div>
      <div class="terminal-body">{{CODE_CONTENT}}</div>
    </div>

    {{DESCRIPTION_BLOCK}}

    <div class="repo-label">github.com/{{FULL_NAME}}</div>
  </div>
</body>
</html>
