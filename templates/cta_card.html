<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: linear-gradient(160deg, #0f0f23 0%, #1a1a3e 60%, #0f0f23 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    overflow: hidden;
    text-align: center;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.18;
  }
  .orb-1 { width: 700px; height: 700px; background: #667eea; top: 50%; left: 50%; transform: translate(-50%, -50%); }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 50px;
  }

  .star-icon {
    font-size: 160px;
    line-height: 1;
    animation: pulse 2s ease-in-out infinite;
    filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.5));
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .cta-main {
    font-size: 88px;
    font-weight: 900;
    line-height: 1.05;
    background: linear-gradient(135deg, #ffffff 0%, #ffd700 50%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .repo-name {
    font-size: 52px;
    font-weight: 700;
    color: #a5b4fc;
    letter-spacing: -1px;
  }

  .divider {
    width: 100px;
    height: 4px;
    background: linear-gradient(90deg, #667eea, #ffd700, #764ba2);
    border-radius: 2px;
  }

  .url-box {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 30px 50px;
    font-size: 36px;
    color: rgba(255,255,255,0.7);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    word-break: break-all;
    letter-spacing: 0.5px;
  }

  .follow-cta {
    font-size: 44px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    line-height: 1.4;
  }

  .highlight {
    color: #667eea;
    font-weight: 800;
  }

  .button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 100px;
    padding: 36px 80px;
    font-size: 46px;
    font-weight: 800;
    color: white;
    letter-spacing: 0.5px;
    box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>

  <div class="content">
    <div class="star-icon">⭐</div>
    <div class="cta-main">Star it on GitHub</div>
    <div class="repo-name">{{REPO_NAME}}</div>
    <div class="divider"></div>
    <div class="url-box">github.com/{{FULL_NAME}}</div>
    <div class="button">Star the Repo →</div>
    <div class="follow-cta">
      Follow for more<br>
      <span class="highlight">open-source gems</span>
    </div>
  </div>
</body>
</html>
