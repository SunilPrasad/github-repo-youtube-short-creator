<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: linear-gradient(160deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
  }
  .orb-1 { width: 500px; height: 500px; background: #667eea; top: 200px; right: -150px; }
  .orb-2 { width: 350px; height: 350px; background: #764ba2; bottom: 200px; left: -80px; }

  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 60px;
  }

  .header {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .tag {
    font-size: 28px;
    font-weight: 700;
    color: #667eea;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .title {
    font-size: 80px;
    font-weight: 900;
    line-height: 1.05;
    background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .divider {
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 2px;
    margin-top: 8px;
  }

  .features {
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .feature-item {
    display: flex;
    align-items: flex-start;
    gap: 28px;
    background: rgba(102, 126, 234, 0.08);
    border: 1px solid rgba(102, 126, 234, 0.2);
    border-radius: 16px;
    padding: 32px 36px;
    transition: all 0.2s;
  }

  .feature-icon {
    font-size: 44px;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .feature-text {
    font-size: 38px;
    font-weight: 500;
    color: rgba(255,255,255,0.88);
    line-height: 1.45;
  }

  .repo-label {
    text-align: center;
    font-size: 30px;
    color: rgba(255,255,255,0.35);
    font-weight: 400;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="content">
    <div class="header">
      <div class="tag">{{REPO_NAME}}</div>
      <div class="title">Key Features</div>
      <div class="divider"></div>
    </div>

    <div class="features">
      {{FEATURE_ITEMS}}
    </div>

    <div class="repo-label">github.com/{{FULL_NAME}}</div>
  </div>
</body>
</html>
