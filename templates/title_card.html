<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: linear-gradient(160deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    overflow: hidden;
  }

  /* Decorative background orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
  }
  .orb-1 { width: 600px; height: 600px; background: #667eea; top: -100px; right: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #764ba2; bottom: -50px; left: -50px; }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 40px;
  }

  .icon {
    font-size: 120px;
    line-height: 1;
    filter: drop-shadow(0 0 30px rgba(102, 126, 234, 0.5));
  }

  .badge {
    background: rgba(102, 126, 234, 0.2);
    border: 1px solid rgba(102, 126, 234, 0.5);
    border-radius: 100px;
    padding: 10px 30px;
    font-size: 28px;
    font-weight: 600;
    color: #a5b4fc;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .repo-name {
    font-size: 96px;
    font-weight: 900;
    line-height: 1.0;
    background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -2px;
    word-break: break-word;
  }

  .owner {
    font-size: 38px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    letter-spacing: 1px;
  }

  .description {
    font-size: 40px;
    color: rgba(255,255,255,0.8);
    line-height: 1.5;
    max-width: 860px;
    font-weight: 300;
  }

  .divider {
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 2px;
  }

  .stats {
    display: flex;
    gap: 50px;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .stat-value {
    font-size: 52px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
  }

  .stat-label {
    font-size: 26px;
    color: rgba(255,255,255,0.45);
    font-weight: 400;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stat-sep {
    width: 1px;
    height: 60px;
    background: rgba(255,255,255,0.15);
  }

  .language-pill {
    background: rgba(102, 126, 234, 0.25);
    border: 1px solid rgba(102, 126, 234, 0.4);
    border-radius: 8px;
    padding: 8px 24px;
    font-size: 30px;
    font-weight: 600;
    color: #a5b4fc;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="content">
    <div class="icon">{{ICON}}</div>
    <div class="badge">Open Source</div>
    <div class="repo-name">{{REPO_NAME}}</div>
    <div class="owner">by {{OWNER}}</div>
    <div class="divider"></div>
    <div class="description">{{DESCRIPTION}}</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-value">{{STARS}}</div>
        <div class="stat-label">Stars</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <div class="stat-value">{{FORKS}}</div>
        <div class="stat-label">Forks</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <div class="language-pill">{{LANGUAGE}}</div>
        <div class="stat-label">Language</div>
      </div>
    </div>
  </div>
</body>
</html>
